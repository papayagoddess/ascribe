<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>äm: text editor</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&family=Playfair+Display:ital@0;1&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #ffffff; --text-dim: #d1d1d1; --accent: #222; --line-height: 32px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--accent); font-family: 'Montserrat', sans-serif; }
        body { display: flex; flex-direction: column; }
        header { padding: 35px 20px 5px 20px; text-align: center; flex-shrink: 0; }
        h1 { font-family: 'Playfair Display', serif; font-weight: 400; font-size: 1.1rem; letter-spacing: 5px; margin: 0; text-transform: lowercase; opacity: 0.8; }
        
        .stats { font-size: 0.6rem; letter-spacing: 2px; color: var(--text-dim); text-transform: lowercase; margin-top: 8px; }
        .controls { display: flex; justify-content: center; gap: 15px; padding: 10px; flex-shrink: 0; flex-wrap: wrap; }
        .style-bar { display: flex; justify-content: center; gap: 35px; padding: 12px; border-top: 1px solid #fcfcfc; }
        .action { background: none; border: none; font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.8rem; color: var(--text-dim); cursor: pointer; text-transform: lowercase; }

        #äm-workspace { flex-grow: 1; width: 100%; max-width: 700px; margin: 0 auto; padding: 20px; outline: none; font-size: 20px; line-height: var(--line-height); overflow-y: auto; white-space: pre-wrap; word-wrap: break-word; padding-bottom: 60vh; }
        #äm-workspace:empty::before { content: "begin..."; color: #f5f5f5; }

        /* The View Mode Overlay */
        #view-mode { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: none; flex-direction: column; padding: 40px 20px; overflow-y: auto; }
        .view-header { position: sticky; top: 0; background: white; padding-bottom: 20px; display: flex; align-items: center; border-bottom: 1px solid #f9f9f9; margin-bottom: 20px; }
        .back-btn { border: none; background: none; font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; cursor: pointer; color: var(--accent); }
        .view-filename { flex-grow: 1; text-align: center; font-size: 0.6rem; letter-spacing: 2px; color: #ccc; text-transform: uppercase; }
        #view-content { font-size: 20px; line-height: 32px; max-width: 700px; margin: 0 auto; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>

<input type="file" id="filePicker" accept=".txt" style="display:none" onchange="loadFileForView(event)">

<div id="view-mode">
    <div class="view-header">
        <button class="back-btn" onclick="closeViewMode()">← back</button>
        <div id="active-filename" class="view-filename">viewing file</div>
    </div>
    <div id="view-content"></div>
</div>

<header>
    <h1>äm</h1>
    <div class="stats"><span id="wordCount">0</span> words</div>
</header>

<div class="controls">
    <button class="action" onclick="document.getElementById('filePicker').click()">view file</button>
    <button id="chaosBtn" class="action" onclick="toggleChaos()">chaos: off</button>
    <button class="action" onclick="exportDoc()">save as</button>
</div>

<div class="style-bar">
    <button class="action" style="font-weight:900" onclick="applyStyle('bold')">B</button>
    <button class="action" style="font-family:'Playfair Display'; font-style:italic" onclick="applyStyle('italic')">I</button>
    <button class="action" style="font-family:'Dancing Script'" onclick="applyCursive()">c</button>
</div>

<div id="äm-workspace" contenteditable="true" spellcheck="false"></div>

<script>
    const canvas = document.getElementById('äm-workspace');
    const wordCountDisplay = document.getElementById('wordCount');
    let isChaos = false;

    // Load Draft
    window.onload = () => {
        canvas.innerHTML = localStorage.getItem('am_current_draft') || "";
        updateStats();
    };

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }

    // --- VIEW FILE LOGIC ---
    function loadFileForView(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('view-content').innerText = e.target.result;
            document.getElementById('active-filename').innerText = file.name;
            document.getElementById('view-mode').style.display = 'flex';
        };
        reader.readAsText(file);
        
        // Reset the input so you can pick the same file again if needed
        event.target.value = '';
    }

    function closeViewMode() {
        document.getElementById('view-mode').style.display = 'none';
        document.getElementById('view-content').innerText = '';
    }

    // --- EDITOR LOGIC ---
    function toggleChaos() {
        isChaos = !isChaos;
        document.getElementById('chaosBtn').innerText = `chaos: ${isChaos ? 'on' : 'off'}`;
        canvas.focus();
    }

    function applyStyle(cmd) { document.execCommand(cmd, false, null); canvas.focus(); }
    function applyCursive() {
        document.execCommand('fontName', false, 'Dancing Script');
        canvas.focus();
    }

    canvas.addEventListener('input', () => {
        updateStats();
        if (isChaos) document.execCommand('foreColor', false, `hsl(${Math.random()*360}, 95%, 45%)`);
        localStorage.setItem('am_current_draft', canvas.innerHTML);
    });

    function updateStats() {
        const words = canvas.innerText.trim() ? canvas.innerText.trim().split(/\s+/).length : 0;
        wordCountDisplay.innerText = words;
    }

    function exportDoc() {
        const content = canvas.innerText;
        const filename = prompt("export as:", "my_notes.txt");
        if (!filename) return;
        const blob = new Blob([content], {type: "text/plain"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = filename.endsWith('.txt') ? filename : filename + '.txt';
        link.click();
    }
</script>
</body>
        </html>
